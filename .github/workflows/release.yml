# SPDX-License-Identifier: Apache-2.0
#
# Release workflow: builds both ARM64 images and pushes them to GHCR when a
# version tag (e.g. v1.0.0) is pushed.
#
# Prerequisites:
#   - The repo/package must be linked to your GitHub account.
#   - The GITHUB_TOKEN has write:packages permission (set in the job below).
#
# Images published:
#   ghcr.io/simonhard/omero-server-arm64:<tag>
#   ghcr.io/simonhard/omero-server-arm64:latest
#   ghcr.io/simonhard/omero-web-arm64:<tag>
#   ghcr.io/simonhard/omero-web-arm64:latest

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build and push ARM64 images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Clone upstream repos
        run: |
          mkdir -p _build
          git clone --depth 1 https://github.com/ome/omero-server-docker.git _build/omero-server-docker
          git clone --depth 1 https://github.com/ome/omero-web-docker.git _build/omero-web-docker

      - name: Build and push omero-server (arm64)
        uses: docker/build-push-action@v6
        with:
          context: _build/omero-server-docker
          file: dockerfiles/omero-server.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/simonhard/omero-server-arm64:${{ github.ref_name }}
            ghcr.io/simonhard/omero-server-arm64:latest
          build-args: |
            OMERO_VERSION=5.6.17
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push omero-web (arm64)
        uses: docker/build-push-action@v6
        with:
          context: _build/omero-web-docker
          file: dockerfiles/omero-web.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/simonhard/omero-web-arm64:${{ github.ref_name }}
            ghcr.io/simonhard/omero-web-arm64:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
