worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Allow large microscopy image uploads (adjust as needed)
    client_max_body_size 10G;

    # Increase buffer sizes for large responses
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    upstream omero_web {
        server omero-web:4080;
    }

    server {
        listen 80;
        server_name _;

        # Increase timeouts for large uploads and slow OMERO operations
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_connect_timeout 75s;

        # Forward real client IP and preserve Host (including port) for Django
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;

        location / {
            proxy_pass http://omero_web;
        }

        # Serve OMERO.web static files directly from nginx for better performance.
        # Uncomment and adjust the path if you mount the static files volume here.
        # location /static/ {
        #     alias /opt/omero/web/OMERO.web/static/;
        # }
    }

    # Uncomment to enable HTTPS (provide certificates in ./certs/)
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     client_max_body_size 10G;
    #     proxy_read_timeout   600s;
    #     proxy_send_timeout   600s;
    #
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto https;
    #
    #     location / {
    #         proxy_pass http://omero_web;
    #     }
    # }
}
